name: Deploy to GitHub Pages

on:
  # Chạy quy trình này mỗi khi bạn push code lên nhánh `main`
  push:
    branches:
      - main

  # Cho phép bạn chạy quy trình này thủ công từ tab Actions trên GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Astro
        uses: withastro/action@v2
        with:
          node-version: 18 # Hoặc phiên bản Node.js bạn đang dùng
          package-manager: npm # Hoặc pnpm, yarn

      - name: Deploy
        run: npx astro deploy --remote
